version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: betpesa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: betpesa
      POSTGRES_PASSWORD: betpesa
      POSTGRES_DB: betpesa
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U betpesa -d betpesa']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: betpesa-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
