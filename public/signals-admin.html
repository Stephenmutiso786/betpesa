<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal Portal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="dash-shell">
      <header class="dash-top">
        <div>
          <h1>Signal Provider Portal</h1>
          <p id="sp-me">Loading...</p>
        </div>
        <div class="top-right">
          <button id="sp-logout-btn" type="button">Logout</button>
        </div>
      </header>

      <section class="panel two-col">
        <div class="stack">
          <h2>Auto Aviator Signals</h2>
          <div class="item">
            <strong>Live</strong>
            <small id="sp-aviator-live">1.00x</small>
            <strong>Target</strong>
            <small id="sp-aviator-target">2.00x</small>
            <strong>Mode</strong>
            <small id="sp-aviator-mode">-</small>
            <strong>Next Refresh</strong>
            <small id="sp-aviator-next">-</small>
          </div>
          <div id="sp-aviator-upcoming" class="stack"></div>
        </div>

        <form id="sp-create-form" class="stack">
          <h2>Create Signal</h2>
          <input id="sp-game" placeholder="Game / Match (e.g Arsenal vs Chelsea)" required />
          <input id="sp-prediction" placeholder="Prediction (e.g Over 2.5 Goals)" required />
          <input id="sp-odds" type="number" min="1.01" step="0.01" placeholder="Odds" required />
          <select id="sp-confidence">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <input id="sp-starts-at" type="datetime-local" required />
          <button type="submit">Publish For Approval</button>
        </form>

        <div class="stack">
          <h2>Status</h2>
          <div id="sp-stats" class="stack"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Aviator Odds Running</h2>
        <div id="sp-aviator-history" class="signal-history-row"></div>
      </section>

      <section class="panel">
        <h2>My Signal History</h2>
        <div id="sp-signals" class="stack"></div>
      </section>

      <p id="sp-status" class="status"></p>
    </main>

    <script src="/signals-admin.js"></script>
  </body>
</html>
