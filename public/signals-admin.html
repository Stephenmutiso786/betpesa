<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BetPesa Signal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="signal-live-shell">
      <header class="signal-live-topbar">
        <div class="signal-live-brand">
          <span class="dot"></span>
          <strong>BETPESA Signal</strong>
        </div>
        <div class="signal-live-right">
          <span class="signal-refresh-badge" id="sp-refresh-badge">Live • Auto-refresh 1s</span>
          <button id="sp-logout-btn" type="button">Logout</button>
        </div>
      </header>

      <section class="signal-live-center">
        <article class="signal-live-card">
          <small class="meta">CURRENT ROUND</small>
          <p class="state" id="sp-current-state">• WAITING</p>
          <p class="live-odd" id="sp-aviator-live">1.00x</p>
          <small class="meta">CRASH TARGET</small>
          <p class="target" id="sp-aviator-target">2.00x</p>
          <small id="sp-round-id">-</small>
        </article>

        <section class="signal-upcoming-wrap">
          <div class="signal-upcoming-head">
            <h2>Upcoming Crash Points</h2>
            <small id="sp-aviator-next">Refresh in 1s</small>
          </div>
          <div id="sp-aviator-upcoming-grid" class="signal-upcoming-grid"></div>
        </section>
      </section>

      <p id="sp-status" class="status"></p>
    </main>
    <script src="/signals-admin.js"></script>
  </body>
</html>
